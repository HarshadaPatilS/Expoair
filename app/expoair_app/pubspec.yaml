name: expoair_app
description: "ExpoAir — Personal AQI Exposure Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.32.0
  firebase_database: ^10.5.6

  # Bluetooth
  flutter_blue_plus: ^1.31.15

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0

  # Networking
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.67.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/animations/
