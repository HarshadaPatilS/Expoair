services:
  - type: web
    name: expoair-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: MODELS_DIR
        value: /opt/render/project/src/ml/models_saved
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENAQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase_creds.json
      - key: PORT
        value: 8000
      - key: OPENMETEO_BASE_URL
        value: https://api.open-meteo.com/v1
      - key: CORS_ORIGINS
        value: https://expoair-airsense.vercel.app